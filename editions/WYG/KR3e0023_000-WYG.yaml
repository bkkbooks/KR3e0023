body:
  text: 提要旅舍備要方一卷醫家類臣等謹案旅舍備要方一卷宋董汲撰陳振孫書録解題載有小兒斑疹論脚氣治法不及此書然宋史藝文志載之卷帙亦同盖陳氏偶未見也汲因客途猝病醫尤難特集經効之方百有餘道内如蚰蜒入耳及中藥毒最為險急而所用之藥至為簡易其雜傷五方古書中不少槩見今亦罕𫝊尤頗見竒特葢古所謂專門禁方用之則神驗至求其理則和扁有所不能解即此數也至於小半夏湯五苓散兩方本於漢之張機今以半夏湯治濕痰仍其本法至五苓散本法傷寒汗後不解及有水氣之病今書中引為通行利水之劑殆亦變通用之如河間益元散本雙解半表半裏之傷寒而後人取以醫暑歟其治中暑一方似即李杲清暑益氣湯之藍本其無比香薷散與後來局方稍有出入盖亦本古方為加減然云治兩脚轉筋疼痛而反去主治之木𤓰則不解其故矣小兒一門大概與同時錢乙藥證直訣相出入第以柔脆之腸胃而多用膩粉硃砂諸峻藥古人氣厚服之無妨在後來亦未可槩施也原本乆佚今從永樂大典收掇排纂得方尚幾五十仍舊目分為一十有二類其觸寒心痛厥風涎潮等證有録無書無從校補則亦闕焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序夫醫藥之來皆原于農黄二帝之書其奥博微妙莫不符契隂陽五行消長之理脗合君臣相與之道則固非庸流俗輩所能鈎索之也推聖人之心盖深切於蠲痾濟世欲躋天下生靈於夀域而已矣董君汲少服儒術嗜閱醫經洞徹其簡切應用者近百餘方可以備旅舍應猝之用編目成集共為一卷號曰旅舍備要方將鏤板以廣其傳君可謂能推究聖人之所存心者哉誠可嘉尚余故輒為之引云孟震序自序汲少小多病因習醫藥常思世人榮辱汩馳喜怒妄作飲食不節興居無常倐忽之間疾起不測迫於倉卒不暇藥餌以斯致困可不惜哉况宦游南北客涉道途冒觸居多邪氣易入方藥備急尤當究心且如觸寒心痛冒熱中暍厥風涎潮伏暑霍亂亟來急治方可安全推類求之不能悉數汲自業醫以來收經效竒方計百餘道證詳而法畧使覽之者曉然可用目之曰旅舍備要方為一卷庶幾道途疾病治療有歸不敢私隠具録如左董汲序
